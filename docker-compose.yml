services:
  postgres:
    image: postgres:16
    container_name: api-documentation-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_documentation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
